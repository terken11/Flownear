<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Fresh Flowers</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Serif font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Playfair Display', serif;
    }

    .fabric-bg {
      background-color: #f6f2ed;
      position: relative;
      overflow-x: hidden;
    }

    /* FABRIC OVERLAY (sits ABOVE content) */
    .fabric-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        radial-gradient(rgba(0,0,0,0.025) 1px, transparent 1px);
      background-size: 6px 6px, 6px 6px, 4px 4px;
      z-index: 30;
      pointer-events: none;
    }

    .pattern-border {
      background-image: url('https://raw.githubusercontent.com/terken11/Flownear/refs/heads/main/border-pattern.png');
      background-repeat: repeat-x;
      background-size: auto 100%;
      height: 38px;
      position: relative;
      z-index: 40;
    }
  </style>
</head>

<body class="fabric-bg">

  <!-- TOP BORDER -->
  <div class="pattern-border -mb-16"></div>

  <!-- HERO -->
  <section class="relative max-w-7xl mx-auto px-6 md:px-8 py-20 md:py-28 grid grid-cols-1 md:grid-cols-2 items-center gap-12">

    <!-- CONTENT (BEHIND FABRIC) -->
    <div class="relative z-20 text-center md:text-left">
      <h1 class="text-[36px] md:text-[56px] leading-tight font-semibold text-[#4a3a2e]">
        Find fresh<br>
        flowers near you.
      </h1>

      <p class="mt-6 text-lg italic text-[#7a6a5e]">
        Order online or pick up in-store.
      </p>

      <a
        href="#"
        class="inline-flex items-center gap-3 mt-8 bg-[#c86b2c] text-white px-7 py-4 rounded-md shadow-md hover:bg-[#b55f25] transition"
      >
        Download app
        <span class="text-xl">➜</span>
      </a>
    </div>

<!-- IMAGE -->
<div class="relative md:absolute md:right-0 md:top-1/2 md:-translate-y-1/2 z-20 
            -mx-6 md:mx-0 flex justify-center md:justify-end">
  <img
    src="https://raw.githubusercontent.com/terken11/Flownear/refs/heads/main/hero-model.png"
    alt="Woman holding phone and flower"
    class="
      w-full
      max-w-none
      h-[1000px]
      md:h-[1080px]
      object-contain
    "
  />
</div>

    <!-- FABRIC OVERLAY -->
    <div class="fabric-overlay"></div>

  </section>

  <!-- BOTTOM BORDER -->
  <div class="pattern-border -mt-16"></div>

</body>
</html>
